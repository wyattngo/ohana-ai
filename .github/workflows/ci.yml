# Ohana AI Seller — CI. Runs on every push / PR.
# Assumes ohana-ai/ IS the GitHub repo root (this file at <repo>/.github/workflows/ci.yml).
# Adapted from drnickv4@d32b1c19 (phase 1.3 port). Removed: DrNick anti-drift check_drift.py
# step (spec 02 §3 OUT), frontend widget vitest job (Ohana web/ deferred to Phase 3+).
name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    # Real Postgres so migrations + retrieval tests run for real (NOT skipped).
    # pgvector image matches docker-compose + is required for pgvector Embedder wiring at Phase 2+.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ohana
          POSTGRES_PASSWORD: ohana
          POSTGRES_DB: ohana
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ohana"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      # Real Redis so the session/cache/flag tests (Phase 3+ pending_reply, feature flags) run for real.
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      # Points app settings + alembic at the service container.
      DATABASE_URL: postgresql+psycopg://ohana:ohana@localhost:5432/ohana
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (project + dev deps)
        run: pip install -e ".[dev]"

      - name: Headless guardrail (DENY rules on ported source — Python only for now; FE JS added at Phase 3+)
        run: |
          python .claude/hooks/guardrail.py $(find app agent retrieval parsing -name '*.py' 2>/dev/null)

      # `--no-cache` CỐ Ý, dù runner vốn không có `.ruff_cache` (chỉ cache pip). Giữ ở đây để
      # lệnh CI và lệnh local GIỐNG NHAU TỪNG KÝ TỰ. Đã trả giá: `.ruff_cache` cũ trên máy dev
      # do một bản ruff trước ghi ra không bị vô hiệu khi ruff nâng cấp ⇒ `ruff check .` local
      # trả "All checks passed!" trong khi `--no-cache` trả 4 lỗi trên CÙNG source. Gate local
      # nói dối, GATE_FULL của ADP nuốt lời nói dối đó vào EVIDENCE (ISSUE-019).
      - name: Ruff lint (incl S / bandit)
        run: ruff check . --no-cache

      - name: Ruff format check
        run: ruff format --check . --no-cache

      # spec 06 F2: db/bridge/tools added EXPLICITLY. mypy already reached them via
      # follow-imports, so this does not change what is checked — it pins the intent so a
      # future import-graph change cannot silently drop them.
      #
      # `api` + `auth` added 2026-07-20 (ISSUE-024 follow-up) ⇒ scope giờ là TOÀN BỘ code
      # sản phẩm, không còn thư mục nào bị loại. Lý do loại chúng trước đây — "10
      # pre-existing FastAPI Depends typing errors" — ĐÃ HẾT ĐÚNG: đo thật ra 0 lỗi, các
      # lỗi đó được vá dần trong spec 04–07 mà không ai gỡ dòng loại trừ. Một exclusion
      # sống lâu hơn lý do của nó chính là cách ISSUE-024 tồn tại được: `api/webhook.py`
      # giữ một Protocol lệch suốt mà không gate nào có cơ hội nhìn thấy.
      #
      # ⚠️ Không còn exclusion nào ⇒ **đừng thêm lại mà không kèm điều kiện gỡ**. Thư mục
      # mới bị loại "tạm thời" sẽ ở ngoài vĩnh viễn, vì không ai nhớ quay lại đo.
      - name: Mypy (strict)
        run: mypy app agent retrieval parsing db bridge tools api auth

      # AI-coder map: docs/codebase-map.md must match the tree. The generator + check are
      # stdlib-only and vendored (mirror of .claude/skills/AI-coder/scripts/, which lives
      # outside this repo so CI cannot reach it — see scripts/ai_coder/README.md). Catches a
      # tree change that skipped regenerating the map, unbypassably.
      - name: AI-coder codebase map is current
        run: python3 scripts/ai_coder/gen_codebase_map.py --check

      # Derivation pipeline (ADR 2026-07-22): ROADMAP §4.1.1 `derives_from` phải trỏ
      # anchor CÓ THẬT trong backend-workflow.md. Đây là chốt chặn luôn-bật —
      # `.pre-commit-config.yaml` chỉ chạy sau khi ai đó `pre-commit install`, CI thì không.
      - name: Derivation map (ROADMAP derives_from vs workflow anchors)
        run: python3 scripts/roadmap_derive.py verify

      - name: DB migrate (empty tree at Phase 1.3 — first migration lands at Phase 2)
        run: alembic upgrade head

      - name: Pytest
        run: pytest -q
