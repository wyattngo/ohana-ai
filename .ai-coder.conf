# AI-coder project profile. Every project-specific fact the skill needs.
# Repeatable keys: pair, registry, invariant.

packages = agent api app auth bridge channels db parsing retrieval storage tools
map = docs/codebase-map.md
migrations = db/migrations/versions
guardrail = .claude/hooks/guardrail.py
registry = tools/registry.py

# Commands. Under ADP these should match the phase block's GATE / GATE_FULL.
#
# ⚠️ gate_full PHẢI phủ mọi step CI chạy được local. Bản trước thiếu 4 step
# (ruff format · guardrail · codebase-map · derivation map) ⇒ executor xanh local
# rồi vỡ CI. Đã xảy ra thật: CI đỏ 12 run liên tiếp 2026-07-22→23, gốc là
# codebase-map stale — mà script sinh map lại là của chính skill này, chỉ vì
# gate_full không gọi nó. Thêm step vào CI thì thêm luôn vào đây.
#
# KHÔNG đưa `alembic upgrade head` vào gate_full: pytest (fixture fresh_db) drop+create
# schema từ Base.metadata và không đụng alembic_version, nên chạy chung một lượt sẽ
# cho kết quả phụ thuộc thứ tự. CI chạy nó trên container sạch nên an toàn ở đó.
# Verify chuỗi migration thủ công khi đụng db/migrations — xem CLAUDE.md §10.
gate = .venv/bin/python -m pytest -q -x
gate_full = .venv/bin/python -m pytest tests/ -q -m 'not live' && .venv/bin/mypy app agent retrieval parsing storage db bridge tools api auth && .venv/bin/ruff check . --no-cache && .venv/bin/ruff format --check . --no-cache && .venv/bin/python .claude/hooks/guardrail.py $(find app agent retrieval parsing storage -name '*.py' 2>/dev/null) && python3 scripts/ai_coder/gen_codebase_map.py --check && python3 scripts/roadmap_derive.py verify

# Surfaces that must stay in step. Format:
#   pair = <producer file> :: <regex> :: <consumer file>
# Every regex match found in the producer must also appear in the consumer.
# pair = agent/orchestrator.py :: (\w+Event) :: api/chat.py
