# Alembic config — Ohana AI Seller.
# DB URL is NOT set here; env.py pulls it from the DATABASE_URL environment variable at
# Phase 1.3 (placeholder). At Phase 2 the pull moves to app.config.get_settings() (like drnickv4).
[alembic]
script_location = db/migrations
prepend_sys_path = .
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
