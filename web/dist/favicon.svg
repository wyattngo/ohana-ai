<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Ohana favicon — brand bundle "Favicon 32px" variant: solid primary/700 tile with the
       mark knocked out in primary/50. Stroke is 12 here (vs 10 in the full lockup) because
       the mark loses weight at 16px; that widening is specified in the bundle, not invented.
       Replaced a placeholder chevron glyph that predates the brand and shared none of its
       geometry (recoverable via git if it turns out to belong to something else). -->
  <rect width="80" height="80" rx="12" fill="#6D28D9"/>
  <line x1="16" y1="58" x2="40" y2="26" stroke="#F5F3FF" stroke-width="12" stroke-linecap="round"/>
  <line x1="40" y1="26" x2="64" y2="58" stroke="#F5F3FF" stroke-width="12" stroke-linecap="round"/>
  <circle cx="40" cy="46" r="3" fill="#6D28D9"/>
</svg>
